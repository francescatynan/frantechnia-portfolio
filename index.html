<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="/favicon-light.ico" sizes="any" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; worker-src blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; media-src 'self'; font-src 'self' https://fonts.gstatic.com; connect-src 'self' ws://localhost:5173 ws://localhost:5174; base-uri 'self'; form-action 'self';" />
    <meta name="robots" content="index, follow, max-image-preview:none" />

    <title>Francesca — Junior Software Engineer</title>
    <meta
      name="description"
      content="Francesca — Junior Software Engineer. I build clean, performance-minded web applications with React, TypeScript, GraphQL, and Postgres."
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://francescatynan.co.uk/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Francesca — Junior Software Engineer" />
    <meta
      property="og:description"
      content="Clean, performance-minded web applications with React, TypeScript, GraphQL, and Postgres."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://francescatynan.co.uk/" />
    <!-- og:image: add once a 1200×630px social share image is created -->
    <!-- <meta property="og:image" content="https://francescatynan.co.uk/og.png" /> -->

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Francesca Tynan",
      "url": "https://francescatynan.co.uk",
      "jobTitle": "Junior Software Engineer",
      "sameAs": [
        "https://github.com/francescatynan",
        "https://www.linkedin.com/in/francescatynan/",
        "https://www.instagram.com/frantechnia/",
        "https://www.threads.net/@frantechnia"
      ]
    }
    </script>

    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = saved || (prefersDark ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <style>
        body { font-family: serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #111110; color: #FFE9D6; text-align: center; padding: 24px; box-sizing: border-box; }
      </style>
      <p>This site requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
